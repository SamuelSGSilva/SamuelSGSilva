# GitHub Action para gerar a animação da cobrinha
# Baseado na recomendação de Platane/snk (v3)

name: gerar-cobrinha

on:
  # executa automaticamente a cada 12 horas
  schedule:
    - cron: "0 */12 * * *"
  # permite executar manualmente
  workflow_dispatch:
  # atualiza a animação sempre que houver push na branch main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Gera a animação a partir das contribuições
      - name: Gerar github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publica o arquivo SVG no branch 'output'
      - name: Publicar animação no branch output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
